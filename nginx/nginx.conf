worker_processes auto;
events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Performance ──────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 1000;

    # ─── Gzip Compression ────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # ─── Logging ─────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─── Rate Limiting Zones (edge protection) ───────────────
    # Device heartbeat: 1000 devices × 1/60s = ~17/s total
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=device_api:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=auth_api:10m rate=5r/s;

    # ─── Upstream (scale by adding more app containers) ──────
    upstream pimisa_app {
        least_conn;
        server app:3000;
        # server app-2:3000;  # uncomment for multi-replica
        # server app-3:3000;
    }

    # ─── HTTP → HTTPS Redirect ───────────────────────────────
    server {
        listen 80;
        server_name _;

        # Health check endpoint (no redirect)
        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # Redirect everything else to HTTPS
        # Uncomment when TLS certs are configured:
        # return 301 https://$host$request_uri;

        # For development without TLS, proxy directly:
        location / {
            proxy_pass http://pimisa_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Device API endpoints (higher rate limit)
        location ~ ^/api/(machines|voucher|sales) {
            limit_req zone=device_api burst=20 nodelay;
            proxy_pass http://pimisa_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Smaller timeouts for device API
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }

        # Auth endpoints (strict rate limit)
        location /api/auth {
            limit_req zone=auth_api burst=5 nodelay;
            proxy_pass http://pimisa_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin API (moderate rate limit)
        location /api/admin {
            limit_req zone=api_general burst=10 nodelay;
            proxy_pass http://pimisa_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static assets — cache aggressively
        location /_next/static {
            proxy_pass http://pimisa_app;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # ─── HTTPS Server (uncomment when TLS is ready) ──────────
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     # Same location blocks as HTTP server above
    # }
}
